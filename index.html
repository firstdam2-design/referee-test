<html lang="ko">

        .btn-sub { background: #3498db; color: white; display: none; }

        .step-title { color: #f1c40f; font-weight: bold; display: block; margin-top: 10px; border-left: 3px solid #f1c40f; padding-left: 8px; }
    </style>
</head>
