<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIBA 심판 트레이너 v5.2</title>
    <style>
        body { font-family: -apple-system, 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #121212; color: #ffffff; }
        .container { text-align: center; background: #1e1e1e; padding: 20px; border-radius: 20px; width: 92%; max-width: 650px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { .container { max-width: 800px; padding: 40px; } }
        .official-tag { color: #3498db; font-weight: bold; font-size: 1rem; margin-bottom: 10px; display: block; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h2 { color: #f39c12; font-size: 1.5rem; margin: 10px 0; }
        
        #box { min-height: 280px; margin: 20px 0; padding: 30px; background: #262626; text-align: left; line-height: 1.9; font-size: 1.1rem; border-radius: 12px; border-left: 8px solid #f39c12; }
        .situ-label { display: block; font-weight: bold; color: #f1c40f; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .situ-content { display: block; margin-bottom: 20px; padding-left: 10px; border-left: 2px solid #444; }
        
        #answer-box { display: none; background: #2c3e50; padding: 25px; border-radius: 12px; text-align: left; font-size: 1rem; margin-bottom: 20px; border: 1px dashed #3498db; color: #ecf0f1; max-height: 550px; overflow-y: auto; }
        .btn-group { display: flex; gap: 10px; flex-direction: column; }
        @media (min-width: 480px) { .btn-group { flex-direction: row; } }
        button { flex: 1; padding: 18px; font-size: 1.1rem; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; background: #444; color: white; }
        .btn-main { background: #f39c12; color: white; }
        .btn-sub { background: #3498db; color: white; display: none; }
        
        .highlight { color: #ff5555; font-weight: bold; }
        .possession { color: #2ecc71; font-weight: bold; }
        .step-title { color: #f1c40f; font-weight: bold; display: block; margin-top: 15px; border-left: 4px solid #f1c40f; padding-left: 10px; margin-bottom: 8px; }
        .role-badge { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 5px; font-size: 1.2rem; }

        .color-white { color: #ffffff; }
        .color-black { color: #aaaaaa; font-weight: 900; }
        .color-blue { color: #3498db; font-weight: bold; }
        .color-red { color: #e74c3c; font-weight: bold; }
        .color-orange { color: #e67e22; font-weight: bold; }
        .color-yellow { color: #f1c40f; font-weight: bold; }
        .color-green { color: #2ecc71; font-weight: bold; }
        .area-tag { color: #9b59b6; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <span class="official-tag" id="off-display">v5.2 | 수비팀 우선 인지 시스템</span>
    <h2>🏀 구역별 실전 판정 훈련</h2>
    <div id="box">버튼을 눌러 상황을 확인하세요.</div>
    <div id="answer-box"></div>
    <div class="btn-group">
        <button type="button" class="btn-main" id="btn-gen">상황 발생!</button>
        <button type="button" id="btn-ans" class="btn-sub">판정 및 드로우인 확인</button>
    </div>
</div>

<script>
    (function() {
        let currentAns = "";
        const CONFIG = {
            teams: [
                { name: "화이트", class: "color-white" }, { name: "블랙", class: "color-black" },
                { name: "블루", class: "color-blue" }, { name: "레드", class: "color-red" },
                { name: "오렌지", class: "color-orange" }, { name: "옐로", class: "color-yellow" }
            ],
            players: ["4번", "7번", "11번", "23번", "30번"],
            foulTypes: ["푸싱", "홀딩", "핸드체킹", "블로킹"],
            leadSpots: [
                { name: "제 4구역 (페인트존 정면 및 골밑)", throwIn: "가까운 엔드라인" },
                { name: "제 5구역 (오른쪽 코너 및 엔드라인 부근)", throwIn: "오른쪽 엔드라인" }
            ],
            trailSpots: [
                { name: "제 1구역 (왼쪽 하프라인 부근)", throwIn: "왼쪽 사이드라인" },
                { name: "제 2구역 (왼쪽 45도 외곽)", throwIn: "왼쪽 사이드라인" },
                { name: "제 3구역 (정면 탑 지역)", throwIn: "가까운 사이드라인" },
                { name: "제 6구역 (오른쪽 45도 외곽)", throwIn: "오른쪽 사이드라인" }
            ]
        };

        const box = document.getElementById('box');
        const answerBox = document.getElementById('answer-box');
        const btnGen = document.getElementById('btn-gen');
        const btnAns = document.getElementById('btn-ans');

        function getRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generate() {
            const isLead = Math.random() > 0.5;
            const myRole = isLead ? "Lead (리드)" : "Trail (트레일)";
            const spot = isLead ? getRand(CONFIG.leadSpots) : getRand(CONFIG.trailSpots);
            
            const offense = getRand(CONFIG.teams); 
            let defense = getRand(CONFIG.teams); while(defense.name === offense.name) { defense = getRand(CONFIG.teams); }
            const pOff = getRand(CONFIG.players);
            const pDef = getRand(CONFIG.players);
            const foul = getRand(CONFIG.foulTypes);

            let situHtml = ""; let ansHtml = "";
            const scenarioRand = Math.random();

            // 1. 내 위치
            situHtml += `<span class="situ-label">1. 내 현재 위치</span><div class="situ-content"><span class="role-badge">${myRole}</span></div>`;
            
            // 2. 팀 정보 (수비팀 먼저 배치)
            situHtml += `<span class="situ-label">2. 팀 컬러 및 공수 정보</span><div class="situ-content">
                수비: <strong class="${defense.class}">${defense.name}팀</strong> | 
                공격: <strong class="${offense.class}">${offense.name}팀</strong>
            </div>`;

            // 3. 세부 상황
            if (scenarioRand < 0.6) { // 파울 상황
                const isShoot = isLead || Math.random() > 0.7;
                const isMade = Math.random() > 0.5;
                
                if (isShoot) {
                    situHtml += `<span class="situ-label">3. 상황 세부 정보</span><div class="situ-content">
                        <span class="area-tag">${spot.name}</span>에서 수비 <span class="${defense.class}">${defense.name}팀</span> ${pDef}가 
                        슛 시도 중인 <span class="${offense.class}">${offense.name}팀</span> ${pOff}에게 <span class="highlight">${foul}</span> 파울! <br>
                        결과: <strong>${isMade ? '성공 (And-1)' : '실패'}</strong>
                    </div>`;
                    ansHtml = `<span class="step-title">① 판정 및 리포팅</span>
                        - 주먹 들고 시계 정지! "<span class="${defense.class}">${defense.name}</span> ${pDef}, ${foul}, 슛 파울!"<br>
                        <span class="step-title">② 스위칭 및 프리드로우</span>
                        - 판정 심판(${isLead?'리드':'트레일
